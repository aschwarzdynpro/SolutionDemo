hso_displayname: |-
    =Concatenate(
        hso_linenumber,
        " ",
        hso_name,
        Switch(
            hso_positiondetails,
            global_hso_hsopositiondetails.'100000002',
            " [Alt.]",
            global_hso_hsopositiondetails.'100000000',
            " [Opt.]",
            global_hso_hsopositiondetails.'100000001',
            " [Bei.]",
            ""
        )
    )
hso_formattedlinenumber_level: =Text(Value(hso_linenumber_level), "000")
hso_sortinglinenumber: =If(Or(hso_level = 1, IsBlank(hso_templatedetail_parentid)), hso_formattedlinenumber_level,Concatenate(hso_calculationdetail_parentid_sortinglinenum, ".", hso_formattedlinenumber_level))
