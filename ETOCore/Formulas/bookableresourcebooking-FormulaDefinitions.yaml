hso_customer: |-
    =If(msdyn_ResourceRequirement.hso_projecttask_ref.hso_projectcategoryid.hso_categorygroup = "MON", msdyn_ResourceRequirement.hso_ProjectAssembly_ref.msdyn_customer.name,
        If(!IsBlank(msdyn_workorder.msdyn_workordertype),msdyn_workorder.msdyn_serviceaccount.name,msdyn_projectid.msdyn_customer.name
    ))
hso_detail: |-
    =If(msdyn_ResourceRequirement.hso_projecttask_ref.hso_projectcategoryid.hso_categorygroup = "MON", msdyn_ResourceRequirement.hso_ProjectAssembly_ref.msdyn_subject,
        If(!IsBlank(msdyn_workorder.msdyn_workordertype),msdyn_workorder.msdyn_workordertype.msdyn_name ,msdyn_projectid.msdyn_subject
    ))
hso_order: |-
    =If(msdyn_ResourceRequirement.hso_projecttask_ref.hso_projectcategoryid.hso_categorygroup = "MON", 
        msdyn_ResourceRequirement.hso_ProjectAssembly_ref.hso_projectnumber,
            If(!IsBlank(msdyn_workorder.msdyn_workordertype),
                msdyn_workorder.msdyn_name,
                msdyn_projectid.hso_projectnumber
    ))
hso_resource: =Resource.name
hso_status: =BookingStatus.name
hso_task: |-
    =If(msdyn_ResourceRequirement.hso_projecttask_ref.hso_projectcategoryid.hso_categorygroup = "MON", msdyn_ResourceRequirement.hso_projecttask_ref.msdyn_subject,
        If(!IsBlank(msdyn_workorder.msdyn_workordertype),msdyn_workorder.msdyn_workordersummary,msdyn_ResourceRequirement.hso_projecttask_ref.msdyn_subject
    ))
hso_workorderandcustomer: =msdyn_workorder.msdyn_name & " - " & msdyn_workorder.msdyn_serviceaccount.name
hso_workordertype_str: =msdyn_workorder.msdyn_workordertype.msdyn_name
